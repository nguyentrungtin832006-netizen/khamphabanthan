        body {

        }
        /* Định nghĩa màu tím hoa oải hương làm chủ đạo theo nút bấm trong ảnh */
        .bg-lavender-primary { background-color: #7a70e6; }
        .text-lavender-primary { color: #7a70e6; }
        .hover\:bg-lavender-dark:hover { background-color: #655bc7; }
        .hover\:text-lavender-dark:hover { color: #655bc7; }
        .shadow-lavender { border-color: rgba(122, 112, 230, 0.2); --tw-shadow-color: rgba(122, 112, 230, 0.2); }
        .bg-lavender-light { background-color: #f3f0ff; }
        .text-lavender-light { color: #9187f5; }
        /* --- CẤU HÌNH HIỆU ỨNG LƯỚT 4 ẢNH TỰ ĐỘNG (KHÔNG ĐỔI CẤU TRÚC WEB) --- */
.slider-container {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 450px; /* Khớp với chiều cao khối cũ của bạn */
    overflow: hidden;
    border-radius: 1.5rem;
}
.slider-wrapper {
    display: flex;
    width: 400%; /* 4 ảnh = 400% */
    height: 100%;
    animation: autoSlide 16s infinite ease-in-out;
}
.slide-item {
    width: 25%; /* Mỗi ảnh chiếm 1 phần 4 */
    height: 100%;
    min-height: 450px;
    background-size: cover;
    background-position: center;
    flex-shrink: 0;
}
/* Vòng lặp mượt mà giữa 4 ảnh */
@keyframes autoSlide {
    0%, 20% { transform: translateX(0); }
    25%, 45% { transform: translateX(-25%); }
    50%, 70% { transform: translateX(-50%); }
    75%, 95% { transform: translateX(-75%); }
    100% { transform: translateX(0); }
}
/* BỐ CỤC HỒ SƠ */
        .container {
            display: flex;
            max-width: 1100px;
            width: 100%;
            gap: 25px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background-color: #ffffff;
            border-radius: 16px;
            padding: 25px 0;
            box-shadow: 0 4px 15px rgba(122, 112, 230, 0.06);
            height: 600px; /* Đã sửa thành tự co giãn để không bị cố định 600px thô cứng */
        }

        .profile-summary {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #f3f0ff;
            margin-bottom: 15px;
        }

        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 12px;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #7a70e6;
        }

        .camera-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            background-color: #7a70e6;
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid #fff;
            cursor: pointer;
        }

        .profile-summary h3 {
            font-size: 16px;
            color: #333;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-summary p {
            font-size: 13px;
            color: #757575;
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #555;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .menu-item i {
            width: 25px;
            font-size: 16px;
            color: #7a70e6;
        }

        .menu-item.active {
            color: #7a70e6;
            background-color: #f3f0ff;
            border-left: 4px solid #7a70e6;
            padding-left: 21px;
            font-weight: 500;
        }

        .menu-item:hover:not(.active) {
            background-color: #faf9ff;
            color: #7a70e6;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            background-color: #ffffff;
            border-radius: 16px;
            padding: 30px 40px;
            box-shadow: 0 4px 15px rgba(122, 112, 230, 0.06);
        }

        .main-content h2 {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            padding-bottom: 20px;
            border-bottom: 1px solid #f3f0ff;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #4a5568;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .form-control {
            width: 100%;
            height: 45px;
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: all 0.2s;
        }

        .form-control:focus {
            border-color: #7a70e6;
            box-shadow: 0 0 0 3px rgba(122, 112, 230, 0.15);
        }

        .form-control:disabled {
            background-color: #f8fafc;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .btn-submit {
            background-color: #7a70e6;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(122, 112, 230, 0.2);
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #655bc7;
            box-shadow: 0 6px 16px rgba(122, 112, 230, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
