<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản | Khảo Sát Tâm Lý</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 25px;
        }

        .logo-area h2 {
            color: #1E1B4B;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .logo-area h2 span {
            color: #7a70e6;
        }

        .logo-area p {
            color: #777;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: #7a70e6;
            box-shadow: 0 0 0 3px rgba(122, 112, 230, 0.15);
        }

        .terms-row {
            margin-bottom: 20px;
            text-align: left;
            font-size: 13px;
            color: #555;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .terms-row input {
            margin-top: 3px;
            cursor: pointer;
        }

        .terms-row a {
            color: #7a70e6;
            text-decoration: none;
            font-weight: 500;
        }

        .terms-row a:hover {
            text-decoration: underline;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: #7a70e6;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-register:hover {
            background-color: #655bc7;
        }

        .btn-register:disabled {
            background-color: #a59ee3;
            cursor: not-allowed;
        }

        .login-redirect {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .login-redirect a {
            color: #7a70e6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .login-redirect a:hover {
            color: #655bc7;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo-area">
            <h2>Khám Phá Bản Thân</h2>
            <p>Tạo tài khoản để lưu lại lịch sử làm bài trắc nghiệm</p>
        </div>

        <form id="registerForm" onsubmit="handleRegisterSubmit(event)">
            
            <div class="form-group">
                <label for="fullName">Họ và tên</label>
                <input type="text" id="fullName" name="Họ tên" placeholder="Nhập họ và tên của bạn" required>
            </div>

            <div class="form-group">
                <label for="email">Địa chỉ Email</label>
                <input type="email" id="email" name="Email đăng ký" placeholder="Nhập địa chỉ email của bạn" required>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="Mật khẩu" placeholder="Mật khẩu (tối thiểu 6 ký tự)" minlength="6" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu của bạn" required>
            </div>

            <div class="terms-row">
                <input type="checkbox" id="terms" required>
                <label for="terms">Tôi đồng ý với các <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a>.</label>
            </div>

            <button type="submit" class="btn-register">Đăng Ký Ngay</button>
        </form>

        <div class="login-redirect">
            Đã có tài khoản? <a href="trangdangnhap.html">Đăng nhập tại đây</a>
        </div>
    </div>

    <script>
        async function handleRegisterSubmit(event) {
            event.preventDefault(); // Chặn hành vi reload trang mặc định của Form

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.querySelector('.btn-register');

            // 1. Kiểm tra tính trùng khớp mật khẩu trước khi gửi dữ liệu lên hệ thống
            if (password !== confirmPassword) {
                alert("Mật khẩu xác nhận không trùng khớp! Vui lòng kiểm tra lại.");
                return;
            }

            // Thu thập toàn bộ dữ liệu từ các ô input
            const form = event.target;
            const data = new FormData(form);

            // Đổi trạng thái nút bấm để tránh người dùng click nhiều lần liên tục
            const originalText = submitBtn.innerText;
            submitBtn.innerText = "ĐANG ĐĂNG KÝ...";
            submitBtn.disabled = true;

            try {
                // 2. Gửi dữ liệu ẩn danh qua Formspree (Thay YOUR_FORMSPREE_ID bằng ID của bạn)
                const response = await fetch("https://formspree.io/f/mqeoggzd", {
                    method: "POST",
                    body: data,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    // 3. Nếu gửi dữ liệu về email thành công -> Hiện thông báo và lập tức chuyển trang
                    alert("Đăng ký tài khoản thành công!");
                    window.location.href = "trangbiachinh.html"; 
                } else {
                    const errorData = await response.json();
                    alert("Có lỗi xảy ra: " + (errorData.errors.map(e => e.message).join(', ') || "Vui lòng thử lại."));
                }
            } catch (error) {
                alert("Không thể kết nối đến máy chủ. Vui lòng kiểm tra lại đường truyền mạng.");
            } finally {
                // Khôi phục nút bấm trong trường hợp lỗi xảy ra để họ chỉnh sửa form
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
