<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đơn Mua Của Tôi - Khám Phá Bản Thân</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #7a70e6; /* Màu nền tím oải hương đồng bộ */
        }
        /* Định nghĩa bộ màu Tím hoa oải hương hệ thống */
        .bg-lavender-primary { background-color: #7a70e6; }
        .text-lavender-primary { color: #7a70e6; }
        .border-lavender-primary { border-color: #7a70e6; }
        .hover\:bg-lavender-dark:hover { background-color: #655bc7; }
        .hover\:text-lavender-dark:hover { color: #655bc7; }
        
        /* Thanh cuộn ẩn cho các tab di động */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-[#dfcbfb] to-[#b6cbff] text-slate-700 antialiased min-h-screen flex flex-col justify-between" 
      x-data="{ 
          orders: JSON.parse(localStorage.getItem('ordersList')) || [],
          currentTab: 'tat-ca',
          
          // Bộ lọc đơn hàng bằng Alpine.js
          get filteredOrders() {
              if (this.currentTab === 'tat-ca') return this.orders;
              return this.orders.filter(order => order.status === this.currentTab);
          },
          
          // Hàm xử lý hủy đơn hàng đồng bộ UI và LocalStorage
          cancelOrder(orderId) {
              Swal.fire({
                  title: 'Hủy đơn hàng này?',
                  text: 'Bạn có chắc chắn muốn hủy đơn hàng này không? Hành động này không thể hoàn tác.',
                  icon: 'warning',
                  showCancelButton: true,
                  confirmButtonColor: '#7a70e6',
                  cancelButtonColor: '#94a3b8',
                  confirmButtonText: 'Xác nhận hủy',
                  cancelButtonText: 'Giữ lại đơn',
                  customClass: {
                      popup: 'rounded-2xl'
                  }
              }).then((result) => {
                  if (result.isConfirmed) {
                      this.orders = this.orders.map(order => {
                          if (order.id === orderId) {
                              order.status = 'da-huy';
                          }
                          return order;
                      });
                      localStorage.setItem('ordersList', JSON.stringify(this.orders));
                      Swal.fire({
                          title: 'Đã hủy thành công!',
                          text: 'Đơn hàng của bạn đã chuyển sang trạng thái hủy đơn.',
                          icon: 'success',
                          confirmButtonColor: '#7a70e6'
                      });
                  }
              });
          }
      }">

    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-white/20 shadow-md">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-start">
            <a href="sanpham.html" class="text-sm font-semibold text-slate-600 hover:text-lavender-primary transition flex items-center gap-1.5">
                <i class="fa-solid fa-chevron-left text-xs"></i> Quay lại
            </a>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="mb-6 flex items-center gap-2.5 text-white">
            <i class="fa-solid fa-clock-history text-xl"></i>
            <h1 class="text-xl font-bold tracking-tight">Lịch sử đơn mua của bạn</h1>
        </div>

        <div class="flex bg-white rounded-xl p-1 shadow-md mb-6 overflow-x-auto no-scrollbar gap-1 border border-white/10">
            <button @click="currentTab = 'tat-ca'" :class="currentTab === 'tat-ca' ? 'bg-lavender-primary text-white font-medium shadow-sm' : 'text-slate-600 hover:bg-slate-50'" class="flex-1 py-2.5 px-4 text-sm rounded-lg transition cursor-pointer whitespace-nowrap text-center">
                Tất cả đơn
            </button>
            <button @click="currentTab = 'cho-xac-nhan'" :class="currentTab === 'cho-xac-nhan' ? 'bg-lavender-primary text-white font-medium shadow-sm' : 'text-slate-600 hover:bg-slate-50'" class="flex-1 py-2.5 px-4 text-sm rounded-lg transition cursor-pointer whitespace-nowrap text-center">
                Chờ xác nhận
            </button>
            <button @click="currentTab = 'da-huy'" :class="currentTab === 'da-huy' ? 'bg-lavender-primary text-white font-medium shadow-sm' : 'text-slate-600 hover:bg-slate-50'" class="flex-1 py-2.5 px-4 text-sm rounded-lg transition cursor-pointer whitespace-nowrap text-center">
                Đã hủy đơn
            </button>
        </div>

        <template x-if="filteredOrders.length === 0">
            <div class="text-center bg-white py-16 px-4 rounded-2xl shadow-lg flex flex-col items-center justify-center border border-white/10">
                <div class="w-16 h-16 rounded-full bg-slate-50 flex items-center justify-center mb-4 text-slate-300 text-2xl">
                    <i class="fa-solid fa-folder-open"></i>
                </div>
                <p class="text-slate-400 text-sm font-medium mb-5">Danh mục này hiện tại không có đơn hàng nào.</p>
                <a href="sanpham.html" class="bg-lavender-primary text-white px-6 py-2.5 rounded-xl font-medium text-sm shadow-md hover:bg-lavender-dark transition shadow-lavender/20">
                    Khám phá sản phẩm ngay
                </a>
            </div>
        </template>

        <div class="space-y-4">
            <template x-for="order in filteredOrders" :key="order.id">
                <div class="bg-white rounded-2xl shadow-lg overflow-hidden border border-white/10 transition hover:shadow-xl">
                    
                    <div class="px-5 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center flex-wrap gap-2">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold uppercase bg-slate-200 text-slate-700 px-2 py-1 rounded-md tracking-wider" x-text="'#' + order.id"></span>
                            <span class="text-xs text-slate-400" x-text="order.date"></span>
                        </div>
                        <div>
                            <span x-show="order.status === 'cho-xac-nhan'" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-50 text-amber-600 border border-amber-200/60">
                                <span class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse"></span> Chờ xác nhận
                            </span>
                            <span x-show="order.status === 'da-huy'" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-rose-50 text-rose-600 border border-rose-200/60">
                                <i class="fa-solid fa-circle-xmark text-[10px]"></i> Đã hủy bỏ
                            </span>
                        </div>
                    </div>

                    <div class="divide-y divide-slate-100 px-5">
                        <template x-for="item in order.items">
                            <div class="py-4 flex gap-4 items-center">
                                <img :src="item.img" alt="Hình ảnh sản phẩm" class="w-14 h-14 rounded-xl object-cover bg-slate-50 border border-slate-100 flex-shrink-0" onerror="this.src='https://via.placeholder.com/100?text=MindCare';">
                                <div class="flex-grow min-w-0">
                                    <h4 class="font-semibold text-slate-800 text-sm truncate" x-text="item.title"></h4>
                                    <div class="flex items-center justify-between mt-1">
                                        <span class="text-xs text-slate-400 font-medium" x-text="'Số lượng: x' + item.quantity"></span>
                                        <span class="text-sm font-semibold text-slate-700" x-text="item.price.toLocaleString('vi-VN') + 'đ'"></span>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div class="px-5 py-4 bg-slate-50/30 border-t border-slate-100 flex justify-between items-center flex-wrap gap-4">
                        <div class="flex items-center gap-1.5 text-xs font-medium text-slate-400 bg-slate-100 px-2.5 py-1 rounded-md">
                            <i class="fa-solid fa-credit-card"></i>
                            <span x-text="order.payment ? order.payment : 'Thanh toán'"></span>
                        </div>
                        
                        <div class="flex items-center gap-4 justify-end flex-1 sm:flex-none w-full sm:w-auto">
                            <div class="text-sm text-slate-500 font-medium">
                                Tổng số tiền: 
                                <span class="text-lg font-bold text-lavender-primary ml-1" x-text="order.total.toLocaleString('vi-VN') + 'đ'"></span>
                            </div>
                            
                            <template x-if="order.status === 'cho-xac-nhan'">
                                <button type="button" @click="cancelOrder(order.id)" class="text-xs font-bold text-rose-500 border border-rose-200 bg-white hover:bg-rose-50 px-4 py-2 rounded-xl transition cursor-pointer shadow-sm">
                                    <i class="fa-solid fa-ban mr-1"></i> Hủy đơn mua
                                </button>
                            </template>
                        </div>
                    </div>

                </div>
            </template>
        </div>
    </main>

    <footer class="bg-white/10 py-6 mt-12 border-t border-white/10">
        <div class="max-w-4xl mx-auto px-4 text-center text-xs text-white/60 space-y-1">
            <p>© 2026 Bản quyền thuộc về Khám Phá Bản Thân - Hành trình Thấu hiểu chính mình.</p>
        </div>
    </footer>

</body>
</html>
